databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: S.Agadzhanyan
      changes:
        - createTable:
            tableName: card_accounts
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_number
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: balance
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addCheckConstraint:
            tableName: card_accounts
            constraintName: chk_card_accounts_balance_non_negative
            checkConstraint: balance >= 0

        - createTable:
            tableName: bonus_operations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_number
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: operation_type
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: impact_amount
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: source_operation_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addCheckConstraint:
            tableName: bonus_operations
            constraintName: chk_bonus_operations_amount_positive
            checkConstraint: amount > 0

        - addForeignKeyConstraint:
            baseTableName: bonus_operations
            baseColumnNames: source_operation_id
            referencedTableName: bonus_operations
            referencedColumnNames: id
            constraintName: fk_bonus_operations_source_operation
